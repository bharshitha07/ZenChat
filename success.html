<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Payment Success</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#0f0f0f;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .success-box{
      background:#1b1b1b;
      padding:40px;
      border-radius:25px;
      text-align:center;
      width:100%;
      max-width:500px;
      border:1px solid #333;
      box-shadow:0 0 20px rgba(255,255,255,0.05);
    }

    .tick{
      font-size:80px;
      margin-bottom:20px;
    }

    h1{
      font-size:38px;
      margin-bottom:15px;
    }

    p{
      color:#bbb;
      font-size:18px;
      margin-bottom:30px;
      line-height:1.6;
    }

    button{
      padding:14px 30px;
      border:none;
      border-radius:12px;
      background:#ffcc70;
      color:black;
      font-size:18px;
      cursor:pointer;
      font-weight:bold;
    }

    button:hover{
      opacity:0.9;
    }

  </style>

</head>

<body>

  <div class="success-box">

    <div class="tick">
      ✅
    </div>

    <h1>Payment Successful</h1>

    <p>

      Welcome to ZenChat Premium ⭐

      <br><br>

      Your premium features are now activated.

    </p>

    <button onclick="goHome()">

      Go To ZenChat

    </button>

  </div>

  <script>

    function goHome(){

      window.location.href =
      "index.html";

    }

  </script>

</body>

</html>
